<html>
<head>
    <title>Cờ Vua Online - Offline Mode</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50; /* Đổi nền tối cho "ngầu" và tập trung vào bàn cờ */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 10px;
            color: white;
        }

        /* Bảng thông tin ván đấu */
        .game-panel {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 440px;
        }

        .my-role-text {
            font-size: 22px;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 18px;
            font-weight: bold;
        }

        #myBoard {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); /* Đổ bóng cho bàn cờ */
            border: 4px solid #34495e;
            border-radius: 4px;
        }
    </style>
</head>
<body>


<div class="game-panel">
    <div class="my-role-text">Bạn là: <span id="my-role" style="color: #e67e22;">Đang chờ server...</span></div>
    <div class="status-text">Trạng thái: <span id="status" style="color: #c0392b;">Đang kết nối</span></div>
</div>

<div id="myBoard" style="width: 500px"></div>

<script>
    // --- KHỞI TẠO BIẾN ---
    var board = null; // Giao diện bàn cờ
    var game = new Chess(); // Trọng tài bắt luật
    var $status = $('#status'); // Thẻ hiển thị chữ

    var myRole = null;

    // 1. KẾT NỐI WEBSOCKET LÊN SERVER
    // Tự động lấy địa chỉ IP và Tên project hiện tại (Ví dụ: ws://localhost:8080/Game/chess)
    var wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
    // Lấy tên project (Context Path), ví dụ: /Game
    var contextPath = window.location.pathname.substring(0, window.location.pathname.indexOf('/', 1));
    var wsUrl = wsProtocol + window.location.host + contextPath + "/chess";

    var socket = new WebSocket(wsUrl);

    socket.onopen = function () {
        console.log("Connect to Chess");
    };

    // Khi nhận được nước đi từ đối thủ (Server gửi về)
    socket.onmessage = function (event) {
        var data = JSON.parse(event.data);

        // Kịch bản 1: Server gửi tin nhắn phân vai trò
        if (data.type === "role") {
            myRole = data.color;
            console.log("My role : " + myRole);
            var roleText = (myRole === 'w') ? "Quân Trắng ⚪" : (myRole === 'b') ? "Quân Đen ⚫" : "Khán Giả 👁️";
            $('#my-role').text(roleText);
            if (data.fen && data.fen !== "start") {
                game.load(data.fen);       // Nạp dữ liệu vào trọng tài (chess.js)
                board.position(data.fen);  // Xếp lại hình ảnh quân cờ (chessboard.js)
            }

            // Nếu tôi bị xếp làm Đen, tự động lật ngược bàn cờ 180 độ
            if (myRole === 'b') {
                board.orientation('black');
            }
            // Nếu tôi là người thứ 3 vào phòng
            else if (myRole === 'spectator') {
                alert("You are spectator");
            }
        }
        // Kịch bản 2: Server gửi tin nhắn nước đi của đối thủ
        else {
            console.log("Competitor move : ", data);
            game.move(data);
            board.position(game.fen());
            updateStatus();
        }
    };

    socket.onerror = function (error) {
        console.log("Lỗi WebSocket: ", error);
    };

    // 2. CÁC HÀM XỬ LÝ KÉO THẢ CHUỘT
    function onDragStart(source, piece, position, orientation) {
        // 1. Nếu ván cờ kết thúc -> Cấm nhấc cờ
        if (game.game_over()) return false;

        // 2. Nếu chưa được Server phát thẻ vai trò hoặc là Khán giả -> Cấm nhấc cờ
        if (myRole === null || myRole === 'spectator') return false;

        // 3. KHÓA LƯỢT: Chưa đến lượt của mình -> Cấm nhấc cờ
        // (Ví dụ: Mình là 'b' nhưng game.turn() đang là 'w' thì không được đi)
        if (game.turn() !== myRole) return false;

        // 4. KHÓA PHE: Chỉ được cầm quân của mình (Trắng không được bốc quân Đen)
        if ((myRole === 'w' && piece.search(/^b/) !== -1) ||
            (myRole === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    function onDrop(source, target) {
        // Kiểm tra nước đi có hợp lệ không
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        // Nếu đi sai luật -> bật lại chỗ cũ
        if (move === null) return 'snapback';

        // NẾU ĐI ĐÚNG LUẬT -> GỬI NƯỚC ĐI CHO SERVER ĐỂ BÁO CHO ĐỐI THỦ
        var myMove = {
            from: source,
            to: target,
            promotion: 'q',
            fen: game.fen()
        };
        socket.send(JSON.stringify(myMove)); // Biến Object thành chuỗi để gửi qua mạng

        updateStatus();
    }

    function onSnapEnd() {
        board.position(game.fen());
    }

    // HÀM GỬI ĐIỂM VỀ JAVA BACKEND (Chuẩn bị cho bước sau)
    // HÀM GỬI ĐIỂM VỀ JAVA BACKEND (ĐÃ MỞ KHÓA)
    function sendScoreToBackend(scoreEarned, matchResult) {
        console.log("🔥 ĐANG CHỐT SỔ: Kết quả=" + matchResult + ", Điểm=" + scoreEarned);

        $.ajax({
            url: "<%=request.getContextPath()%>/save-match",
            method: "POST",
            data: {
                gameId: 1, // ID của Cờ Vua trong MySQL là 1
                score: scoreEarned,
                result: matchResult
            },
            success: function (response) {
                console.log("Đã lưu điểm thành công vào Database: " + response);
            },
            error: function (xhr) {
                console.error("Lỗi khi lưu điểm: " + xhr.responseText);
            }
        });
    }

    // CẬP NHẬT TRẠNG THÁI VÀ BẮT SỰ KIỆN KẾT THÚC GAME
    function updateStatus() {
        var statusHTML = '';
        var turnColor = (game.turn() === 'w') ? 'Trắng' : 'Đen';

        // 1. KIỂM TRA HẾT CỜ (CHECKMATE)
        if (game.in_checkmate()) {
            statusHTML = 'HẾT CỜ! Phe ' + turnColor + ' bị chiếu bí.';

            // Tìm ra ai là người chiến thắng (Nếu tới lượt Trắng đi mà hết cờ -> Đen thắng)
            var winnerRole = (game.turn() === 'w') ? 'b' : 'w';

            // Nếu mình không phải khán giả, thì chốt điểm
            if (myRole !== 'spectator') {
                if (myRole === winnerRole) {
                    alert("🏆 TUYỆT VỜI! Bạn đã CHIẾN THẮNG và nhận được +50 Điểm!");
                    sendScoreToBackend(50, "Win"); // Thắng được 50 điểm
                } else {
                    alert("💀 Rất tiếc! Bạn đã THUA CUỘC.");
                    sendScoreToBackend(10, "Loss"); // Thua được an ủi 10 điểm cày cuốc
                }
            }
        }
        // 2. KIỂM TRA HÒA CỜ (DRAW)
        else if (game.in_draw()) {
            statusHTML = 'HÒA CỜ!';
            if (myRole !== 'spectator') {
                alert("🤝 Trận đấu hòa căng thẳng! Bạn nhận được +20 Điểm.");
                sendScoreToBackend(20, "Draw"); // Hòa được 20 điểm
            }
        }
        // 3. VÁN CỜ ĐANG DIỄN RA
        else {
            statusHTML = 'Đang đợi ' + turnColor + ' đi cờ...';
            // Cảnh báo nếu đang bị chiếu
            if (game.in_check()) {
                statusHTML += ' <b style="color:red;">(NGUY HIỂM: Bị chiếu tướng!)</b>';
            }
        }

        // Đẩy chữ ra giao diện
        $status.html(statusHTML);
    }

    // --- CẤU HÌNH GIAO DIỆN ---
    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };

    board = Chessboard('myBoard', config);
    updateStatus();
</script>
</body>
</html>
